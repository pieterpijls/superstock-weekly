name: Superstock Weekly Screen

on:
  schedule:
    # Every Sunday 06:00 UTC (= 08:00 Belgian summer time) - report in your inbox before breakfast
    - cron: "0 6 * * 0"
  workflow_dispatch: {}        # manual "Run workflow" button for ad-hoc screens

permissions:
  contents: read

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly screen + email report
        env:
          SUPERSTOCK_SMTP_USER: ${{ secrets.SUPERSTOCK_SMTP_USER }}
          SUPERSTOCK_SMTP_PASS: ${{ secrets.SUPERSTOCK_SMTP_PASS }}
        run: python run_weekly.py

      - name: Upload report as artifact (backup copy, 90 days)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: superstock-weekly-report
          path: out/superstock-weekly.html
          retention-days: 90
