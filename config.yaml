# ================= Superstock Weekly Screener =================
screen:
  name: "Superstock Weekly"
  max_market_cap: 10_000_000_000   # hard ceiling in USD (set null to disable)
  min_score: 10                    # keep names scoring >= this (out of 16)
  target_multiple: 20              # price target = forward EPS x this

universe:
  # Your watchlist (edit freely). Discovery candidates are added on top.
  tickers: [MRX, DAVE, VIRT, GEO, SEZL, ECG, COCO, PDFS, LINC, INOD, CECO, ATRO, WLDN, ROOT, INDV]

discovery:
  enabled: true
  # The pool is refreshed every run from Yahoo's stock screener (momentum +
  # >50% revenue growth queries, capped at screen.max_market_cap); the base
  # list file is only extra seeds on top (leave the file empty to skip).
  base_list_file: "base_universe.txt"
  min_dollar_volume: 5_000_000     # ignore illiquid names (avg $ volume/day)
  max_candidates: 20               # total added to the screen, interleaved per list
  screener:
    enabled: true
    min_market_cap: 200_000_000   # floor keeps shells / micro-cap junk out
    pool_size: 200                # names pulled per screener query
  # The four lists a candidate can be tagged with:
  leaders:                        # 1) market leaders: c > MA10 > MA20 > MA50, rising
    min_adr_pct: 5                #    average daily range, %
    min_dollar_volume: 10_000_000
  a_stocks:                       # 2) A-stocks: quarterly revenue growth
    min_rev_growth_pct: 50
  darvas:                         # 3) Darvas: +100% off 52w low, near high, young
    min_gain: 1.0
    max_off_high: 0.15
    max_ipo_years: 5
  # 4) "Surge" (promising other names) uses min_dollar_volume above.

# Manual judgment overrides for the two non-automatable criteria.
# status: ok | mid | no
overrides:
  MRX:  {catalyst: {status: ok,  note: "volatility + M&A engine"}, backlog: {status: mid, note: "raised dividend"}}
  ECG:  {catalyst: {status: ok,  note: "data-center construction"}, backlog: {status: ok, note: "record $3.68B backlog"}}
  CECO: {backlog: {status: ok, note: "first $1B+ backlog, B:B 2.2x"}}

email:
  enabled: true
  smtp_host: smtp.gmail.com
  smtp_port: 465
  # Credentials are read from environment variables when null (recommended):
  #   SUPERSTOCK_SMTP_USER, SUPERSTOCK_SMTP_PASS
  username: null
  password: null
  from_addr: "pieter.pijls@gmail.com"
  to_addrs: ["pieter.pijls@gmail.com"]
  subject_prefix: "Superstock Weekly"
